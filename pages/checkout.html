<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Оформление заказа — МАТКАСЫМ</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/checkout.css" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="topbar"><span>Безопасная оплата · Доставка по всему Казахстану</span></div>

  <header class="header" id="header">
    <div class="header__inner">
      <a href="../index.html" class="header__logo">
        <svg width="120" height="40" viewBox="0 0 120 40"><rect width="120" height="40" rx="4" fill="#0058A3"/><text x="60" y="27" text-anchor="middle" fill="#FFDB00" font-family="Noto Sans,sans-serif" font-weight="700" font-size="14" letter-spacing="2">МАТКАСЫМ</text></svg>
      </a>
      <div class="checkout-steps">
        <span class="step active">1. Данные</span>
        <span class="step-divider">›</span>
        <span class="step">2. Доставка</span>
        <span class="step-divider">›</span>
        <span class="step">3. Оплата</span>
      </div>
    </div>
  </header>

  <main>
    <div class="container">
      <div class="checkout-layout">
        <div class="checkout-form-wrap">
          <div class="checkout-section">
            <h2>Контактные данные</h2>
            <form class="checkout-form" id="checkoutForm" onsubmit="submitOrder(event)">
              <div class="form-row">
                <div class="form-group">
                  <label>Имя *</label>
                  <input type="text" name="firstName" placeholder="Иван" required />
                </div>
                <div class="form-group">
                  <label>Фамилия *</label>
                  <input type="text" name="lastName" placeholder="Иванов" required />
                </div>
              </div>
              <div class="form-group">
                <label>Телефон *</label>
                <input type="tel" name="phone" placeholder="+7 (___) ___-__-__" required />
              </div>
              <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="ivan@example.com" />
              </div>

              <h2 style="margin-top:32px">Адрес доставки</h2>
              <div class="form-group">
                <label>Город *</label>
                <select name="city" required>
                  <option value="">Выберите город</option>
                  <option>Алматы</option>
                  <option>Астана</option>
                  <option>Шымкент</option>
                  <option>Актобе</option>
                  <option>Атырау</option>
                  <option>Другой город</option>
                </select>
              </div>
              <div class="form-group">
                <label>Улица и дом *</label>
                <input type="text" name="address" placeholder="ул. Абая, 100" required />
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label>Квартира</label>
                  <input type="text" name="apt" placeholder="12" />
                </div>
                <div class="form-group">
                  <label>Этаж</label>
                  <input type="text" name="floor" placeholder="5" />
                </div>
              </div>

              <h2 style="margin-top:32px">Способ оплаты</h2>
              <div class="payment-options">
                <label class="payment-option">
                  <input type="radio" name="payment" value="card" checked />
                  <span class="payment-option__box">
                    <span class="payment-option__title">💳 Банковская карта</span>
                    <span class="payment-option__sub">Visa, Mastercard, Мир</span>
                  </span>
                </label>
                <label class="payment-option">
                  <input type="radio" name="payment" value="kaspi" />
                  <span class="payment-option__box">
                    <span class="payment-option__title">📱 Kaspi Pay</span>
                    <span class="payment-option__sub">Оплата через приложение Kaspi</span>
                  </span>
                </label>
                <label class="payment-option">
                  <input type="radio" name="payment" value="cash" />
                  <span class="payment-option__box">
                    <span class="payment-option__title">💵 Наличными при получении</span>
                    <span class="payment-option__sub">Курьеру при доставке</span>
                  </span>
                </label>
                <label class="payment-option">
                  <input type="radio" name="payment" value="credit" />
                  <span class="payment-option__box">
                    <span class="payment-option__title">🏦 Рассрочка 0%</span>
                    <span class="payment-option__sub">До 12 месяцев без переплат</span>
                  </span>
                </label>
              </div>

              <div class="form-group" style="margin-top:20px">
                <label>Комментарий к заказу</label>
                <textarea name="comment" rows="3" placeholder="Например: позвоните перед доставкой"></textarea>
              </div>

              <button type="submit" class="btn btn--blue" style="width:100%;justify-content:center;margin-top:24px;padding:18px;font-size:17px">
                Подтвердить заказ
              </button>
            </form>
          </div>
        </div>

        <aside class="checkout-summary">
          <h3>Ваш заказ</h3>
          <div id="orderItems"></div>
          <div class="checkout-summary__total" id="orderTotal"></div>
        </aside>
      </div>
    </div>
  </main>

  <div id="successModal" class="modal" style="display:none">
    <div class="modal__box">
      <div style="font-size:64px;text-align:center;margin-bottom:16px">🎉</div>
      <h2>Заказ оформлен!</h2>
      <p>Спасибо за покупку. Мы свяжемся с вами в ближайшее время для подтверждения заказа.</p>
      <a href="../index.html" class="btn btn--blue" style="width:100%;justify-content:center;margin-top:24px">На главную</a>
    </div>
  </div>
  <div class="modal-bg" id="modalBg" style="display:none" onclick="closeModal()"></div>

  <script src="../js/products-data.js"></script>
  <script src="../js/cart.js"></script>
  <script src="../js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const itemsEl = document.getElementById('orderItems');
      const totalEl = document.getElementById('orderTotal');
      if (!itemsEl) return;
      const subtotal = getCartTotal();
      const delivery = subtotal >= 50000 ? 0 : 3900;
      itemsEl.innerHTML = cart.map(item => {
        const p = PRODUCTS.find(pr => pr.id === item.id);
        if (!p) return '';
        return `<div class="checkout-order-item">
          <span>${p.name} × ${item.qty}</span>
          <span>${formatPrice(p.price * item.qty)}</span>
        </div>`;
      }).join('') || '<p style="color:#999;font-size:14px">Корзина пуста</p>';
      totalEl.innerHTML = `
        <div class="checkout-order-item"><span>Доставка</span><span>${delivery===0?'Бесплатно':formatPrice(delivery)}</span></div>
        <div class="checkout-order-item checkout-order-item--total"><span>Итого</span><span>${formatPrice(subtotal+delivery)}</span></div>`;
    });

    function submitOrder(e) {
      e.preventDefault();
      cart = [];
      saveCart();
      document.getElementById('successModal').style.display = 'flex';
      document.getElementById('modalBg').style.display = 'block';
    }
    function closeModal() {
      document.getElementById('successModal').style.display = 'none';
      document.getElementById('modalBg').style.display = 'none';
    }
  </script>
</body>
</html>
