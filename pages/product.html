<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Товар — МАТКАСЫМ</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/product.css" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="topbar"><span>Бесплатная доставка от 50 000 ₸ · Пн–Пт 9:00–18:00</span></div>

  <header class="header" id="header">
    <div class="header__inner">
      <button class="header__burger" id="burgerBtn"><span></span><span></span><span></span></button>
      <a href="../index.html" class="header__logo">
        <svg width="120" height="40" viewBox="0 0 120 40"><rect width="120" height="40" rx="4" fill="#0058A3"/><text x="60" y="27" text-anchor="middle" fill="#FFDB00" font-family="Noto Sans,sans-serif" font-weight="700" font-size="14" letter-spacing="2">МАТКАСЫМ</text></svg>
      </a>
      <div class="header__search">
        <form class="search-form" action="catalog.html" method="get">
          <input type="text" name="q" placeholder="Найдите мебель и товары для дома" />
          <button type="submit"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></button>
        </form>
      </div>
      <nav class="header__actions">
        <a href="cart.html" class="header__action header__cart">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
          <span>Корзина</span><span class="cart-badge" id="cartBadge">0</span>
        </a>
      </nav>
    </div>
  </header>

  <main>
    <div class="container">
      <nav class="breadcrumb" id="productBreadcrumb">
        <ul>
          <li><a href="../index.html">Главная</a></li>
          <li><a href="catalog.html">Каталог</a></li>
          <li id="bcProduct">Товар</li>
        </ul>
      </nav>

      <div class="product-detail" id="productDetail">
        <!-- Loaded by JS -->
        <div class="product-detail__loading">Загрузка...</div>
      </div>

      <!-- Related -->
      <section class="section" style="padding-top:48px">
        <div class="section__head">
          <h2 class="section__title">Похожие товары</h2>
          <a href="catalog.html" class="section__link">Смотреть все →</a>
        </div>
        <div class="products-grid" id="relatedGrid"></div>
      </section>
    </div>
  </main>

  <footer class="footer">
    <div class="footer__bottom" style="border-top:none;padding:24px 0">
      <div class="container"><p style="font-size:13px;color:#888;text-align:center">© 2026 МАТКАСЫМ. Все права защищены.</p></div>
    </div>
  </footer>

  <script src="../js/products-data.js"></script>
  <script src="../js/cart.js"></script>
  <script src="../js/main.js"></script>
  <script src="../js/product.js"></script>
</body>
</html>
